<div>
    <h3>Show user list</h3>

    <ul>
        @for(user of userData(); track user.id){

        }
    </ul>
</div>

<form [formGroup]="searchFormGroup">
    <input type="text" placeholder="Seach text..." formControlName="searchInput">
</form>
